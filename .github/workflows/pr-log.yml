name: Log Merged PRs

on:
  pull_request:
    types:
      - closed

jobs:
  log-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Append PR to README
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_DATE: ${{ github.event.pull_request.merged_at }}
          PR_AUTHORS: ${{ github.event.pull_request.user.login }}
        run: |
          # Format date as YYYY-MM-DD
          FORMATTED_DATE=$(echo "$PR_DATE" | cut -c1-10)

          # Collect co-authors from commit trailers in the PR
          CO_AUTHORS=$(git log \
            origin/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }} \
            --pretty=format:"%b" 2>/dev/null \
            | grep -i "^Co-authored-by:" \
            | sed 's/Co-authored-by: //i' \
            | sed 's/ <.*//' \
            | sort -u \
            | tr '\n' ', ' \
            | sed 's/, $//')

          # Build the authors string
          if [ -n "$CO_AUTHORS" ]; then
            AUTHORS="$PR_AUTHORS, $CO_AUTHORS"
          else
            AUTHORS="$PR_AUTHORS"
          fi

          # Ensure the Merged PRs section exists; add it if not
          if ! grep -q "^## Merged PRs" README.md; then
            printf '\n## Merged PRs\n' >> README.md
          fi

          # Append the new bullet point
          printf -- '- %s %s %s\n' "$AUTHORS" "$FORMATTED_DATE" "$PR_TITLE" >> README.md

      - name: Commit README update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: log merged PR \"${{ github.event.pull_request.title }}\""
          git push
