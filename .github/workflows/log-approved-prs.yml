name: Log Approved PRs

on:
  pull_request_review:
    types: [submitted]

jobs:
  log-approved-pr:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Append to PR log
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          APPROVER="${{ github.event.review.user.login }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          APPROVED_AT="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          echo "| #${PR_NUMBER} | ${PR_TITLE} | ${PR_AUTHOR} | ${APPROVER} | ${APPROVED_AT} | [Link](${PR_URL}) |" >> approved-prs.md

      - name: Commit and push log update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add approved-prs.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: log approved PR #${{ github.event.pull_request.number }}"
          git push
